name: Publish

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"
  pull_request:
    types: [closed]

jobs:
  build:
    name: Build distribution
    runs-on: ubuntu-latest
    # Build on version tags AND on merged PRs
    if: github.event_name == 'push' || github.event.pull_request.merged == true

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Build
        run: uv build

      - name: Upload dist
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish-testpypi:
    name: Publish → TestPyPI
    needs: build
    runs-on: ubuntu-latest
    # Publish to TestPyPI for merged PRs only
    if: github.event_name == 'pull_request' && github.event.pull_request.merged == true
    environment:
      name: testpypi
      url: https://test.pypi.org/p/yesterwind-xyzmodem
    permissions:
      id-token: write

    steps:
      - name: Download dist
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish to TestPyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/

  publish-pypi:
    name: Publish → PyPI
    needs: build
    runs-on: ubuntu-latest
    # Publish to real PyPI on version tag pushes
    if: github.event_name == 'push'
    environment:
      name: pypi
      url: https://pypi.org/p/yesterwind-xyzmodem
    permissions:
      id-token: write

    steps:
      - name: Download dist
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
